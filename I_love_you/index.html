<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Just For You</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />

  <meta property="og:title" content="Un corazón con mensajes" />
</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100">

  <div class="card text-center p-4 shadow-lg bg-dark text-light" style="max-width: 500px; border-radius: 20px;">
    <div class="preview mb-3 position-relative">
      <div class="heart-wrap" id="heartContainer">
        <svg class="heart" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-label="Corazón animado">
          <path id="heartStroke" class="stroke" 
                d="M60 100 C20 70, 10 45, 30 30 C45 20, 60 34, 60 44 
                   C60 34, 75 20, 90 30 C110 45, 100 70, 60 100 Z" 
                stroke="#ff7b93" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <g class="pulse">
            <path id="heartFill" 
                  d="M60 100 C20 70, 10 45, 30 30 C45 20, 60 34, 60 44 
                     C60 34, 75 20, 90 30 C110 45, 100 70, 60 100 Z" 
                  fill="#ff4d6d" opacity="0.95"/>
            <ellipse class="shine" cx="70" cy="45" rx="14" ry="8" fill="#ffd6dc" opacity="0.18"></ellipse>
          </g>
        </svg>
      </div>

      <div id="floatingMessage" class="floating-message"></div>
    </div>

    <p class="small mb-3 text-secondary">
     <i> Haz clic en el corazón para ver los mensajes</i>
    </p>

    <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
    
      <button class="btn btn-outline-light" id="downloadBtn">
        📥 Descargar PNG
      </button>
    </div>

    <p class="small-note text-muted mt-3 mb-0">
      Sube este archivo a un hosting (GitHub Pages, Netlify, etc.) para compartir el enlace.
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
